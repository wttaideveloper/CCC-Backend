services:
  # Frontend Application (Next.js)
  frontend:
    build:
      # Set FRONTEND_BUILD_CONTEXT to match your environment (e.g. ../frontend or ../CCC-Web).
      context: ${FRONTEND_BUILD_CONTEXT:-../frontend}
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
        NEXT_PUBLIC_S3_BUCKET_URL: ${NEXT_PUBLIC_S3_BUCKET_URL}
    container_name: ccc-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      NEXT_TELEMETRY_DISABLED: 1
      # Temporary: show child_process activity in logs to identify malicious exec callers.
      NODE_DEBUG: child_process
      # Preload runtime trace hook to log stacks and block suspicious shell executions.
      NODE_OPTIONS: --require /app/trace-exec.js
      BLOCK_SUSPICIOUS_SHELL: "1"
    # Runtime hardening to reduce exploit impact.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # Allow temp writes but prevent executing dropped binaries from temp locations.
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
      - /var/tmp:rw,noexec,nosuid,nodev,size=32m
    pids_limit: 256
    init: true
    networks:
      - ccc-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Transcript summary service (CCC-agent FastAPI + LangChain/OpenAI)
  transcript-summary:
    build:
      context: ../CCC-agent
      dockerfile: Dockerfile
    container_name: ccc-transcript-summary
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${SUMMARY_MODEL_ID:-gpt-4.1-mini}
      OPENAI_TEMPERATURE: ${SUMMARY_MODEL_TEMPERATURE:-0.2}
      OPENAI_MAX_TOKENS: ${SUMMARY_MODEL_MAX_NEW_TOKENS:-700}
      HOST: 0.0.0.0
      PORT: 8080
    networks:
      - ccc-network
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # NestJS Backend Application
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ccc-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      # Application
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000

      # Database - Connect to existing MongoDB container
      MONGO_URI: ${MONGO_URI:-mongodb://admin:CCCPassword123!@mongodb:27017/ccc_db?authSource=admin}
      MONGO_DB_NAME: ${MONGO_DB_NAME:-ccc_db}

      # JWT
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      REFRESH_TOKEN_EXPIRES_IN: ${REFRESH_TOKEN_EXPIRES_IN:-7d}

      # CORS
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}

      #Super Admin
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD}
      
      # Email
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USER: ${MAIL_USER}
      MAIL_PASS: ${MAIL_PASS}
      MAIL_FROM: ${MAIL_FROM}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME}

      # Zoom
      ZOOM_ACCOUNT_ID: ${ZOOM_ACCOUNT_ID}
      ZOOM_CLIENT_ID: ${ZOOM_CLIENT_ID}
      ZOOM_CLIENT_SECRET: ${ZOOM_CLIENT_SECRET}
      ZOOM_WEBHOOK_SECRET_TOKEN: ${ZOOM_WEBHOOK_SECRET_TOKEN}

      # AWS S3
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}

      # AI transcript summary service URL (CCC-agent)
      SUMMARY_SERVICE_URL: ${SUMMARY_SERVICE_URL:-http://transcript-summary:8080/summarize}
      SUMMARY_MODEL_ID: ${SUMMARY_MODEL_ID:-gpt-4.1-mini}
      SUMMARY_MODEL_TIMEOUT_MS: ${SUMMARY_MODEL_TIMEOUT_MS:-120000}
      SUMMARY_MODEL_RETRIES: ${SUMMARY_MODEL_RETRIES:-1}
    depends_on:
      transcript-summary:
        condition: service_healthy
    networks:
      - ccc-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: ccc-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
      - nginx_logs:/var/log/nginx
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
      transcript-summary:
        condition: service_healthy
    networks:
      - ccc-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 70s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  ccc-network:
    external: true

volumes:
  nginx_cache:
    driver: local
  nginx_logs:
    driver: local
